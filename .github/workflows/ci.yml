name : CI - MedicGraph OCR Agentic RAG

on:
  push:
    branchers: [main,develop]
  pull_request: 
    branchers: [main]

jobs:
# Job 1 : Backend - python test + lint , 
#Lint  A highly configurable linter that enforces coding standards and detects errors.
  backend-tests:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \ 
          tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest test/ -v --tb=short -k "not integration"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production

      - name: Run integration tests (if API key available)
        if: env.GEMINI_API_KEY != ''
        run: python -m pytest test/ -v --tb=short -m integration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production

#Job 2  :  Frontend  - Build verification

frontend-build:
  name: Frontend Build
  runs-on: ubuntu-latest
  defaults:
    run:
      working-directory : frontend

  steps: 
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint frontend
      run: npm run lint
      continue-on-error: true

    - name: Build frontend
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8000

# Job 3 : Docker - Build verification (no push)

docker-build:
  name: Docker Build verification
  runs-on : ubuntu-latest
  needs: [backend-tests, frontend-build]

  steps:
   - name: Checkout repository  
     uses: actions/checkout@v4

   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3

   - name: Build backend image
     uses: docker/build-push-action@v6
     with:
          context: ./backend
          push: false
          tags: medicgraph-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

   - name: Build frontend image
     uses: docker/build-push-action@v6
     with:
        context: ./frontend
        push: false
        tags: medicgraph-frontend:ci
        build-args: NEXT_PUBLIC_API_URL=http://localhost:8000
        cache-from: type=gha
        cache-to: type=gha,mode=max
